name: Sync Game Projects

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Clone SpaceShoot
        run: |
          git clone https://github.com/AyanKan04/SpaceShoot.git temp_spaceshoot
          mkdir -p project-1-spaceshoot
          cp -r temp_spaceshoot/* project-1-spaceshoot/
          rm -rf temp_spaceshoot

      - name: Clone Running
        run: |
          git clone https://github.com/AyanKan04/Running.git temp_running
          mkdir -p project-2-running
          cp -r temp_running/* project-2-running/
          rm -rf temp_running

      - name: Clone OKLA
        run: |
          git clone https://github.com/AyanKan04/OKLA.git temp_okla
          mkdir -p project-3-okla
          cp -r temp_okla/* project-3-okla/
          rm -rf temp_okla

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "✨ Sync game projects" || echo "No changes"
          git push origin main
